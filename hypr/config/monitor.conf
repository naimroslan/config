# Monitor wiki https://wiki.hyprland.org/0.45.0/Configuring/Monitors/


# Dynamic monitor configuration - handled by monitor-setup.sh script
# Monitors will be configured automatically based on what's connected

# Default laptop monitor (fallback)
monitor = eDP-1, 1920x1080@60, 0x0, 1

# Workspace rules will be set dynamically by monitor-setup.sh
# All workspaces will be moved to the appropriate monitor automatically

# If you need to scale things like steam etc, please uncomment these lines.
# Adjust GDK_SCALE accordingly to your liking.
#xwayland {
#  force_zero_scaling = true       # Unscale XWayland
#}

#env = GDK_SCALE, 1.25             # GDK Scaling Factor
