# ┃                     Monitor Configuration                   ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# Monitor wiki https://wiki.hyprland.org/0.45.0/Configuring/Monitors/


# Dynamic monitor configuration - handled by monitor-setup.sh script
# Monitors will be configured automatically based on what's connected

# Default laptop monitor (fallback)
monitor = eDP-1, 1920x1080@60, 0x0, 1
monitor = DP-2, 1920x1080@100.08, auto, 1

# Workspace rules - bind workspaces to external monitor when available
# These rules ensure new workspaces are created on the external monitor
workspace = 1, monitor:DP-2
workspace = 2, monitor:DP-2
workspace = 3, monitor:DP-2
workspace = 4, monitor:DP-2
workspace = 5, monitor:DP-2
workspace = 6, monitor:DP-2
workspace = 7, monitor:DP-2
workspace = 8, monitor:DP-2
workspace = 9, monitor:DP-2
workspace = 10, monitor:DP-2
workspace = A, monitor:DP-2
workspace = B, monitor:DP-2
workspace = C, monitor:DP-2
workspace = D, monitor:DP-2
workspace = E, monitor:DP-2
workspace = F, monitor:DP-2
workspace = G, monitor:DP-2
workspace = H, monitor:DP-2
workspace = I, monitor:DP-2
workspace = J, monitor:DP-2
workspace = K, monitor:DP-2
workspace = L, monitor:DP-2
workspace = M, monitor:DP-2
workspace = N, monitor:DP-2
workspace = O, monitor:DP-2
workspace = P, monitor:DP-2
workspace = Q, monitor:DP-2
workspace = R, monitor:DP-2
workspace = S, monitor:DP-2
workspace = T, monitor:DP-2
workspace = U, monitor:DP-2
workspace = V, monitor:DP-2
workspace = W, monitor:DP-2
workspace = X, monitor:DP-2
workspace = Y, monitor:DP-2
workspace = Z, monitor:DP-2

# Keep workspace 11 on laptop monitor
workspace = 11, monitor:eDP-1, persistent:true

