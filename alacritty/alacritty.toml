# Alacritty Configuration

[general]
live_config_reload = true

[window]
padding = { x = 10, y = 10 }
decorations = "None"
opacity = 1.0
dynamic_title = true

[font]
size = 10.0

[font.normal]
family = "Noto Sans Mono"
style = "Bold"

[font.bold]
family = "Noto Sans Mono Black"
style = "Bold"

[font.italic]
family = "Noto Sans Mono"
style = "Italic"

[scrolling]
history = 10000
multiplier = 3

[cursor]
style = { shape = "Block", blinking = "On" }
vi_mode_style = { shape = "Block", blinking = "Off" }
blink_interval = 750

[selection]
save_to_clipboard = true

# Kitty Default Theme
[colors.primary]
background = '#000000'
foreground = '#dddddd'

[colors.cursor]
text = '#111111'
cursor = '#cccccc'

[colors.selection]
text = '#000000'
background = '#fffacd'

[colors.normal]
black   = '#000000'
red     = '#cc0403'
green   = '#19cb00'
yellow  = '#cecb00'
blue    = '#0d73cc'
magenta = '#cb1ed1'
cyan    = '#0dcdcd'
white   = '#dddddd'

[colors.bright]
black   = '#767676'
red     = '#f2201f'
green   = '#23fd00'
yellow  = '#fffd00'
blue    = '#1a8fff'
magenta = '#fd28ff'
cyan    = '#14ffff'
white   = '#ffffff'
